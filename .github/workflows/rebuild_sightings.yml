name: Rebuild Sightings (Wipe + Resync with Affiliate URLs)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview only, no deletes/writes/publishes)"
        type: boolean
        default: true
      confirm_wipe:
        description: "I understand this deletes every current Sighting item in Webflow"
        type: boolean
        default: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run rebuild
        env:
          AIRTABLE_TOKEN:         ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE:          ${{ secrets.AIRTABLE_BASE }}
          RESALE_SIGHTINGS_TABLE: ${{ secrets.RESALE_SIGHTINGS_TABLE }}
          WEBFLOW_API_TOKEN:      ${{ secrets.WEBFLOW_API_TOKEN }}
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          if [ "${{ inputs.confirm_wipe }}" = "true" ]; then
            FLAGS="$FLAGS --confirm-wipe"
          fi
          python scripts/rebuild_sightings.py $FLAGS
