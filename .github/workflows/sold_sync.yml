name: Sold Sync
on:
  schedule:
    - cron: '0 15 * * *'   # 1am AEST — after the midnight expiry checker
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (count only, no writes)'
        type: boolean
        default: false
jobs:
  sold-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run sold sync
        env:
          AIRTABLE_TOKEN:         ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE:          ${{ secrets.AIRTABLE_BASE }}
          RESALE_SIGHTINGS_TABLE: ${{ secrets.RESALE_SIGHTINGS_TABLE }}
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          CREATE_MISSING:         '1'
          DRY_RUN:                ${{ inputs.dry_run && '1' || '0' }}
        run: python scripts/sold_sync.py
