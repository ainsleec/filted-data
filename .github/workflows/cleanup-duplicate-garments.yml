name: Cleanup Duplicate Garments
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no deletions/writes)'
        required: false
        default: 'true'
jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run duplicate garments cleanup
        env:
          AIRTABLE_TOKEN:    ${{ secrets.AIRTABLE_TOKEN }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          DRY_RUN:           ${{ github.event.inputs.dry_run }}
        run: python scripts/cleanup_duplicate_garments.py
