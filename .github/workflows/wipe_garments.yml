name: Wipe Garments (DESTRUCTIVE)
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no deletions/writes)'
        required: false
        default: 'true'
      confirm_text:
        description: 'For a REAL run only: type exactly DELETE ALL GARMENTS'
        required: false
        default: ''
jobs:
  wipe:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Garments wipe
        env:
          AIRTABLE_TOKEN:    ${{ secrets.AIRTABLE_TOKEN }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          DRY_RUN:           ${{ github.event.inputs.dry_run }}
          CONFIRM_TEXT:      ${{ github.event.inputs.confirm_text }}
        run: python scripts/wipe_garments.py
