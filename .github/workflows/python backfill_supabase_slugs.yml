name: Backfill Supabase Slugs

# One-off correction workflow: reconciles Supabase garments.slug against
# the live, correct slug on each garment's matching Webflow item.
# Manually triggered only — this is not meant to run on a schedule.
# See backfill_supabase_slugs.py for full context on why this exists.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log intended changes only, no writes)"
        type: boolean
        default: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run slug backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: python backfill_supabase_slugs.py

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slug-backfill-report
          path: slug_backfill_report.json
          if-no-files-found: warn
