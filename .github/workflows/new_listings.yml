name: New eBay Listings

on:
  schedule:
    - cron: '0 22 * * *'     # 8am AEST (10pm UTC prev day)
    - cron: '0 2 * * *'      # 12pm AEST (2am UTC)
    - cron: '0 7 * * *'      # 5pm AEST (7am UTC)
    - cron: '0 11 * * *'     # 9pm AEST (11am UTC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run new listings scraper
        env:
          AIRTABLE_TOKEN:         ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE:          ${{ secrets.AIRTABLE_BASE }}
          RESALE_SIGHTINGS_TABLE: ${{ secrets.RESALE_SIGHTINGS_TABLE }}
          DESIGNERS_TABLE:        ${{ secrets.DESIGNERS_TABLE }}
          EBAY_CLIENT_ID:         ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET:     ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python scripts/new_listings.py
