name: Image Upload
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # runs daily at 2am UTC

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests pyairtable
      - run: python scripts/image_upload.py
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
