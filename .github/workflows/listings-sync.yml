name: Listings Sync (Airtable → Supabase)

on:
  #schedule:
    # Runs daily at 02:15 UTC — after expiry_checker.py's typical run,
    # so newly-expired listings and their statuses are already settled.
    #- cron: "15 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview only, no writes)"
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run listings sync
        env:
          AIRTABLE_TOKEN:         ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE:          ${{ secrets.AIRTABLE_BASE }}
          RESALE_SIGHTINGS_TABLE: ${{ secrets.RESALE_SIGHTINGS_TABLE }}
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Scheduled runs always execute live — no one is watching to toggle a checkbox.
            python scripts/listings_sync.py
          elif [ "${{ inputs.dry_run }}" = "true" ]; then
            python scripts/listings_sync.py --dry-run
          else
            python scripts/listings_sync.py
          fi
