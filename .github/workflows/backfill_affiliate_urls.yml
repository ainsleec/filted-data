name: Backfill Affiliate URLs (Airtable)
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes)'
        required: false
        default: 'true'   # defaults to safe — you must explicitly choose false to write for real
jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Airtable affiliate URL backfill
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          DRY_RUN:        ${{ github.event.inputs.dry_run }}
        run: python scripts/backfill_affiliate_urls.py
