name: Snapshot Current Slugs
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run snapshot (live Airtable + Webflow fetch, no CSV needed)
        env:
          AIRTABLE_TOKEN:    ${{ secrets.AIRTABLE_TOKEN }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
        run: python scripts/snapshot_current_slugs.py

      - name: Commit snapshot to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add current_slugs_snapshot.csv
          git diff --cached --quiet || git commit -m "Add pre-wipe slug snapshot [automated]"
          git push
