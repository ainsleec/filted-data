name: Backfill Supabase Slugs
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes)'
        required: false
        default: 'true'
      offset:
        description: 'Resume from this row offset (blank = start from 0)'
        required: false
        default: ''
      limit:
        description: 'Process at most this many rows this run (blank = all remaining)'
        required: false
        default: ''
jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Supabase slug backfill
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          DRY_RUN:           ${{ github.event.inputs.dry_run }}
          OFFSET:            ${{ github.event.inputs.offset }}
          LIMIT:             ${{ github.event.inputs.limit }}
        run: python scripts/backfill_supabase_slugs.py
