name: Webflow Sync
on:
  schedule:
    - cron: '10 22 * * *'     # 8am AEST (10pm UTC prev day)
    - cron: '10 2 * * *'      # 12pm AEST (2am UTC)
    - cron: '10 7 * * *'      # 5pm AEST (7am UTC)
    - cron: '10 11 * * *'     # 9pm AEST (11am UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes)'
        required: false
        default: 'false'
permissions:
  contents: write   # needed so the commit-back-to-repo step can push
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Webflow sync
        env:
          AIRTABLE_TOKEN:             ${{ secrets.AIRTABLE_TOKEN }}
          WEBFLOW_API_TOKEN:          ${{ secrets.WEBFLOW_API_TOKEN }}
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:          ${{ secrets.SUPABASE_SERVICE_KEY }}
          CLOUDFLARE_ACCOUNT_ID:      ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN:       ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DRY_RUN:                    ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/webflow_sync.py

      - name: Commit updated garments.json
        if: ${{ github.event.inputs.dry_run != 'true' }}   # never commit during a dry run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garments.json
          git diff --cached --quiet || git commit -m "Update garments.json [automated]"
          git push
