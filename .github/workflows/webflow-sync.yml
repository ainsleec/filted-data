name: Webflow Sync
on:
  schedule:
     - cron: '10 22 * * *'     # 8am AEST (10pm UTC prev day)
     - cron: '10 2 * * *'      # 12pm AEST (2am UTC)
     - cron: '10 7 * * *'      # 5pm AEST (7am UTC)
     - cron: '10 11 * * *'     # 9pm AEST (11am UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes)'
        required: false
        default: 'false'
      designer_filter:
        description: 'Restrict to designer(s), comma-separated (blank = all in-feed)'
        required: false
        default: ''
      limit:
        description: 'Cap number of garments processed (blank = no cap)'
        required: false
        default: ''
      sighted_only:
        description: 'Only process garments with an active/sold sighting right now (for testing Active Listings with real data)'
        required: false
        default: 'false'
permissions:
  contents: write   # needed so the commit-back-to-repo step can push
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Webflow sync
        env:
          AIRTABLE_TOKEN:             ${{ secrets.AIRTABLE_TOKEN }}
          WEBFLOW_API_TOKEN:          ${{ secrets.WEBFLOW_API_TOKEN }}
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:          ${{ secrets.SUPABASE_SERVICE_KEY }}
          CLOUDFLARE_ACCOUNT_ID:      ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN:       ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DRY_RUN:                    ${{ github.event.inputs.dry_run || 'false' }}
          DESIGNER_FILTER:            ${{ github.event.inputs.designer_filter || '' }}
          LIMIT:                      ${{ github.event.inputs.limit || '' }}
          SIGHTED_ONLY:               ${{ github.event.inputs.sighted_only || 'false' }}
        run: python scripts/webflow_sync.py

      - name: Commit updated garments.json
        if: ${{ github.event.inputs.dry_run != 'true' }}   # never commit during a dry run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garments.json
          git diff --cached --quiet && exit 0   # nothing changed, nothing to push

          git commit -m "Update garments.json [automated]"

          # This run can take ~3 hours — other workflows (backfills, other
          # syncs) may well push to main while it's running. A plain
          # `git push` would then fail outright and the whole garments.json
          # update would be lost even though the real Webflow/Airtable/
          # Supabase writes already succeeded independently of this step.
          # Retry with a rebase against the latest main a few times before
          # actually giving up.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt) — fetching and rebasing onto latest main..."
            git fetch origin main
            git rebase origin/main || { echo "Rebase conflict — manual resolution needed"; exit 1; }
            sleep 5
          done
          echo "Push still failing after 5 attempts — giving up. garments.json commit exists locally in this run's log but was NOT pushed."
          exit 1
