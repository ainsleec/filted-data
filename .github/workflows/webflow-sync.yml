name: Webflow Sync
on:
  schedule:
    - cron: '10 22 * * *'     # 8am AEST (10pm UTC prev day)
    - cron: '10 2 * * *'      # 12pm AEST (2am UTC)
    - cron: '10 7 * * *'      # 5pm AEST (7am UTC)
    - cron: '10 11 * * *'     # 9pm AEST (11am UTC)
  workflow_dispatch:         # allows manual trigger from GitHub Actions tab
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pyairtable
      - name: Run sync
        env:
          AIRTABLE_API_KEY:  ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID:  ${{ secrets.AIRTABLE_BASE }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          GH_PAT:            ${{ secrets.GH_PAT }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/sync.py
