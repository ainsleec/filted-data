name: Backfill Post-Rebuild Redirects
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes)'
        required: false
        default: 'true'
jobs:
  redirects:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run post-rebuild redirect backfill
        env:
          CLOUDFLARE_ACCOUNT_ID:      ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN:       ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DRY_RUN:                    ${{ github.event.inputs.dry_run }}
        run: python scripts/backfill_post_rebuild_redirects.py

      - name: Upload no-longer-live report (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redirects-no-longer-live
          path: redirects_no_longer_live.csv
          if-no-files-found: ignore
